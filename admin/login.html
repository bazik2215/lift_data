<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вход в админ-панель</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Дополнительные стили для страницы входа */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f7fc;
            transition: background 0.3s ease;
            padding: 20px;
        }
        
        .login-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .login-header h1 {
            font-size: 1.8rem;
            color: #0b3b5f;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: #4a627a;
            font-size: 0.85rem;
        }
        
        .login-theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(11,59,95,0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        
        .login-theme-toggle:hover {
            background: rgba(11,59,95,0.2);
            transform: scale(0.95);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e4e;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbdbe0;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.2s;
            font-family: inherit;
        }
        
        .form-group input:focus {
            border-color: #0b5e7e;
            outline: none;
            box-shadow: 0 0 0 3px rgba(11,94,126,0.15);
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #0b5e7e;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .login-btn:hover {
            background: #0b3b5f;
            transform: translateY(-1px);
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }
        
        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #8aa0b5;
        }
        
        body.dark-theme .login-container {
            background: #1a1e2c;
        }
        
        body.dark-theme .login-card {
            background: #252a38;
        }
        
        body.dark-theme .login-header h1 {
            color: #a0c4e8;
        }
        
        body.dark-theme .login-header p {
            color: #8a8e9d;
        }
        
        body.dark-theme .form-group label {
            color: #b0b4c0;
        }
        
        body.dark-theme .form-group input {
            background: #2a2e3d;
            border-color: #4a4e5d;
            color: #e0e0e0;
        }
        
        body.dark-theme .login-theme-toggle {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        body.dark-theme .hint {
            color: #6a6e7d;
        }
    </style>
</head>
<body>
    <button id="themeToggle" class="login-theme-toggle" title="Сменить тему">🌙</button>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🔐 Админ-панель</h1>
                <p>Управление домами и лифтами</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div class="form-group">
                <label>Введите пароль</label>
                <input type="password" id="passwordInput" placeholder="Пароль" autofocus>
            </div>
            
            <button id="loginBtn" class="login-btn">Войти</button>
            
            <div class="hint">
                💡 Подсказка: пароль <strong>admin123</strong>
            </div>
        </div>
    </div>
    
    <script>
        // Пароль (можно изменить)
        const ADMIN_PASSWORD = 'admin123';
        
        // Тёмная тема
        function initTheme() {
            const savedTheme = localStorage.getItem('adminTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
                updateThemeButton('dark');
            } else {
                document.body.classList.remove('dark-theme');
                updateThemeButton('light');
            }
        }
        
        function updateThemeButton(theme) {
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        
        function toggleTheme() {
            if (document.body.classList.contains('dark-theme')) {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('adminTheme', 'light');
                updateThemeButton('light');
            } else {
                document.body.classList.add('dark-theme');
                localStorage.setItem('adminTheme', 'dark');
                updateThemeButton('dark');
            }
        }
        
        // Вход
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                showError('❌ Неверный пароль');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }
        
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        
        initTheme();
        
        // Если уже авторизован — сразу перенаправляем
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>

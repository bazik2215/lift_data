<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лифты — список домов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="header-content">
                <div class="header-nav">
                    <a href="index.html" class="nav-link">🏠 Карта</a>
                    <a href="houses.html" class="nav-link active">📋 Список домов</a>
                </div>
                <div class="header-title">Информация о замене лифтов</div>
                <div class="header-stats" id="headerStats">
                    <span class="stat-badge">🏘️ Загрузка...</span>
                    <span class="stat-badge">🛗 ...</span>
                </div>
                <button id="themeToggle" class="theme-toggle" title="Сменить тему">🌙</button>
            </div>
        </div>

        <div class="container">
            <div class="search-header">
                <h2>Список домов</h2>
            </div>
            
            <div class="houses-filters">
                <input type="text" id="searchInput" placeholder="Фильтр по адресу..." autocomplete="off" class="filter-input">
                <select id="districtFilter" class="filter-select">
                    <option value="all">📌 Все районы</option>
                </select>
            </div>

            <div class="info-card">
                <div class="table-wrapper">
                    <table class="houses-table" id="housesTable">
                        <thead>
                            <tr>
                                <th data-sort="address">🏠 Адрес <span class="sort-arrow"></span></th>
                                <th data-sort="district">📍 Район <span class="sort-arrow"></span></th>
                                <th data-sort="buildYear">📅 Год постройки <span class="sort-arrow"></span></th>
                                <th data-sort="floors">🏢 Этажей <span class="sort-arrow"></span></th>
                                <th data-sort="liftsCount">🛗 Лифтов <span class="sort-arrow"></span></th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="housesList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <button id="scrollToTop" class="scroll-to-top" title="Наверх">↑</button>

    <script src="list.js"></script>
</body>
</html>

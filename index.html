<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лифты — капитальный ремонт в Луганске</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://api-maps.yandex.ru/2.1/?apikey=b45543af-a624-4ee6-bef2-7f2e8e8498fd&lang=ru_RU"></script>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="header-content">
                <div class="header-nav">
                    <a href="index.html" class="nav-link active">🏠 Карта</a>
                    <a href="houses.html" class="nav-link">📋 Список домов</a>
                </div>
                <div class="header-title">Информация о замене лифтов</div>
            </div>
        </div>

        <div class="container">
            <div class="search-header">
                <h2>Поиск дома</h2>
            </div>
            
            <div class="search-section">
                <input type="text" id="addressInput" placeholder="Введите адрес, например: Заречный квартал, д. 11" autocomplete="off">
                <div id="suggestions" class="suggestions hidden"></div>
            </div>

            <!-- Блок фильтров -->
            <div class="filters-block">
                <div class="filter-group">
                    <label for="planType" class="filter-label">Тип плана:</label>
                    <select id="planType" class="filter-select">
                        <option value="program">Региональная программа</option>
                        <option value="shortTerm">Краткосрочный план</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="timeFilter" class="filter-label">Период:</label>
                    <select id="timeFilter" class="filter-select">
                        <option value="all">Все время</option>
                    </select>
                </div>
            </div>

            <!-- Контейнер для карты -->
            <div id="map" class="map-container"></div>
        </div>
    </div>

    <script src="map.js"></script>
</body>
</html>
